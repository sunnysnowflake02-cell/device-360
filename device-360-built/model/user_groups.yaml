user_groups:
  - name: masking_redacted
    api_scopes:
      - meta
      - data
      - graphql
      - jobs
      - source
    includes: '*'
  - name: north_american_device_analysts
    api_scopes:
      - meta
      - data
      - graphql
      - jobs
      - source
    includes:
      - users:id:device_analyst_1
      - users:id:device_analyst_2
  - name: device_issue_resolvers
    api_scopes:
      - meta
      - data
      - graphql
      - jobs
      - source
    includes:
      - users:id:issue_resolver_1
      - users:id:issue_resolver_2
  - name: device_performance_monitors
    api_scopes:
      - meta
      - data
      - graphql
      - jobs
      - source
    includes:
      - users:id:performance_monitor_1
      - users:id:performance_monitor_2
