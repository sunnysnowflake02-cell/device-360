tables:
  - name: warranty_instance_data
    title: Warranty Instance Data
    sql: {{ load_sql('warranty_instance_data') }}
    description: Data regarding warranty status and details for devices.
    public: true
    dimensions:
      - name: device_id
        description: Unique identifier for the device.
        type: string
        column: device_id
        primary_key: true
        public: true
      - name: warranty_status
        description: Current status of the warranty (e.g., active, expired).
        type: string
        column: warranty_status
        public: true
      - name: warranty_start_date
        description: Start date of the warranty period.
        type: time
        column: warranty_start_date
        public: true
      - name: warranty_id
        description: Column warranty_id from the source table.
        type: string
        column: warranty_id
        public: true
      - name: warranty_type
        description: Column warranty_type from the source table.
        type: string
        column: warranty_type
        public: true
    measures:
      - name: row_count
        description: Distinct rows at natural grain (count distinct on primary key column).
        type: count
        sql: "{TABLE.device_id}"
