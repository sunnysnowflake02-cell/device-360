tables:
  - name: laptop_battery_ml_predictions
    title: Laptop Battery ML Predictions
    sql: {{ load_sql('laptop_battery_ml_predictions') }}
    description: Machine learning predictions regarding laptop battery performance.
    public: true
    dimensions:
      - name: device_id
        description: Unique identifier for the device.
        type: string
        column: device_id
        primary_key: true
        public: true
      - name: actual
        description: Actual battery performance value.
        type: number
        column: actual
        public: true
      - name: predicted
        description: Predicted battery performance value.
        type: number
        column: predicted
        public: true
      - name: predicted_proba
        description: Column predicted_proba from the source table.
        type: number
        column: predicted_proba
        public: true
    measures:
      - name: row_count
        description: Distinct rows at natural grain (count distinct on primary key column).
        type: count
        sql: "{TABLE.device_id}"
      - name: avg_predicted_battery_performance
        description: Average predicted battery performance across devices.
        type: avg
        sql: "{TABLE.predicted}"
