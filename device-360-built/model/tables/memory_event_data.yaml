tables:
  - name: memory_event_data
    title: Memory Event Data
    sql: {{ load_sql('memory_event_data') }}
    description: Telemetry data regarding memory usage on devices.
    public: true
    dimensions:
      - name: device_id
        description: Unique identifier for the device.
        type: string
        column: device_id
        primary_key: true
        public: true
      - name: freephysicalmemory
        description: Amount of free physical memory available.
        type: number
        column: freephysicalmemory
        public: true
      - name: visiblememory
        description: Total visible memory available.
        type: number
        column: visiblememory
        public: true
      - name: dataset_context_id
        description: Column dataset_context_id from the source table.
        type: string
        column: dataset_context_id
        public: true
      - name: dataset_id
        description: Column dataset_id from the source table.
        type: string
        column: dataset_id
        public: true
      - name: device_context_id
        description: Column device_context_id from the source table.
        type: string
        column: device_context_id
        public: true
      - name: item_context_id
        description: Column item_context_id from the source table.
        type: string
        column: item_context_id
        public: true
      - name: item_id
        description: Column item_id from the source table.
        type: string
        column: item_id
        public: true
      - name: item_name
        description: Column item_name from the source table.
        type: string
        column: item_name
        public: true
      - name: item_time
        description: Column item_time from the source table.
        type: string
        column: item_time
        public: true
      - name: report_time
        description: Column report_time from the source table.
        type: string
        column: report_time
        public: true
      - name: schema_ver
        description: Column schema_ver from the source table.
        type: number
        column: schema_ver
        public: true
      - name: subscription_id
        description: Column subscription_id from the source table.
        type: string
        column: subscription_id
        public: true
      - name: subscription_ids
        description: Column subscription_ids from the source table.
        type: string
        column: subscription_ids
        public: true
    measures:
      - name: row_count
        description: Distinct rows at natural grain (count distinct on primary key column).
        type: count
        sql: "{TABLE.device_id}"
      - name: avg_free_memory
        description: Average free physical memory across devices.
        type: avg
        sql: "{TABLE.freephysicalmemory}"
