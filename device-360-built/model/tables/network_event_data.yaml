tables:
  - name: network_event_data
    title: Network Event Data
    sql: {{ load_sql('network_event_data') }}
    description: Data regarding network connectivity and performance for devices.
    public: true
    dimensions:
      - name: device_id
        description: Unique identifier for the device.
        type: string
        column: device_id
        primary_key: true
        public: true
      - name: connectiontype
        description: Type of network connection (e.g., Wi-Fi, Ethernet).
        type: string
        column: connectiontype
        public: true
      - name: internetconnection
        description: Indicates if the device is connected to the internet.
        type: boolean
        column: internetconnection
        public: true
      - name: linkspeed
        description: Speed of the network link.
        type: number
        column: linkspeed
        public: true
      - name: dataset_context_id
        description: Column dataset_context_id from the source table.
        type: string
        column: dataset_context_id
        public: true
      - name: dataset_id
        description: Column dataset_id from the source table.
        type: string
        column: dataset_id
        public: true
      - name: device_context_id
        description: Column device_context_id from the source table.
        type: string
        column: device_context_id
        public: true
      - name: item_context_id
