    ports:
      lens:
        ref: lens:v1alpha:device-intelligence-360:public
        refType: dataos
        meta:
          description: |
            Device Intelligence 360 semantic model providing unified access to curated metrics and dimensions for this data product.
      rest:
        - url: https://known-racer.mydataos.com/lens2/api/public:device-intelligence-360/v2/rest
          meta:
            description: |
              REST API for programmatic access to the semantic model (filters and measures as exposed by the deployed Lens).
      postgres:
        - host: tcp.known-racer.mydataos.com
          port: 5432
          params:
            ssl: true
          meta:
            description: |
              PostgreSQL access for BI tools against the semantic layer (when enabled for this workspace).
      graphql:
        - url: https://known-racer.mydataos.com/lens2/api/public:device-intelligence-360/v2/graphql
          meta:
            description: |
              GraphQL API for flexible queries over the semantic model schema.
