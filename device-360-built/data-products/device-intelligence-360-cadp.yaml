v1beta:
  data:
    meta:
      title: Device Intelligence 360
      sourceCodeUrl: https://github.com/sunnysnowflake02-cell/device-360/tree/main/device-360-built
    collaborators:
      - name: manpreetsingh
        description: owner

    resource:
      description: |
        The Device Intelligence 360 bundle orchestrates steward-approved sources including Device Data, Device Event Status, Device Issue Data, Employee Data, Laptop Battery Ml Predictions, Memory Event Data, Network Event Data, Process Event Data, Storage Event Data, and Warranty Instance Data into one consistent analytic framework.
        Build a Device Intelligence 360 data product for enterprise laptop fleets.
        Teams use this product for shared definitions of metrics and dimensions, data quality monitoring, and operational reporting across the domain.
      refType: dataos
      ref: bundle:v1beta:device-intelligence-360-bundle

    inputs:
      - description: Device Data - Operational data from the Agenticai Devicesupport domain supporting analytics, reporting, and monitoring for this product.
        purpose: source
        refType: dataos
        ref: dataos://icebase:agenticai_devicesupport/device_data

      - description: Device Event Status - Operational data from the Agenticai Devicesupport domain supporting analytics, reporting, and monitoring for this product.
        purpose: source
        refType: dataos
        ref: dataos://icebase:agenticai_devicesupport/device_event_status

      - description: Device Issue Data - Operational data from the Agenticai Devicesupport domain supporting analytics, reporting, and monitoring for this product.
        purpose: source
        refType: dataos
        ref: dataos://icebase:agenticai_devicesupport/device_issue_data

      - description: Employee Data - Operational data from the Agenticai Devicesupport domain supporting analytics, reporting, and monitoring for this product.
        purpose: source
        refType: dataos
        ref: dataos://icebase:agenticai_devicesupport/employee_data

      - description: Laptop Battery Ml Predictions - Operational data from the Agenticai Devicesupport domain supporting analytics, reporting, and monitoring for this product.
        purpose: source
        refType: dataos
        ref: dataos://icebase:agenticai_devicesupport/laptop_battery_ml_predictions

      - description: Memory Event Data - Operational data from the Agenticai Devicesupport domain supporting analytics, reporting, and monitoring for this product.
