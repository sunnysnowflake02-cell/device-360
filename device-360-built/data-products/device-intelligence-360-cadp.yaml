name: device-intelligence-360-cadp
version: v1beta
entity: product
type: data
purpose: |
  Build a Device Intelligence 360 data product for enterprise laptop fleets.
  This data product is built on steward-approved sources using datasets such as device data, device event status, device issue data, employee data, laptop battery ml predictions, memory event data, network event data, process event data, storage event data, and warranty instance data, integrated into a unified semantic view.
  It can be consumed for reporting, monitoring, operational analytics, and cross-functional decision support.
