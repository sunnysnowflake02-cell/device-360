version: v1
name: wf-device-360-agenticai-cadp-sc
type: workflow
description: |
  Scanner workflow for consumer-aligned data product device-360-agenticai-cadp (metadata registration in DataOS).
tags:
  - Tier.Gold
  - SemanticModelAgent
workspace: public
workflow:
  dag:
    - name: device-360-agenticai-cadp-scan
      description: Scanner for device-360-agenticai-cadp (data product metadata registration).
      title: Device 360 Agenticai Cadp CADP scanner
      spec:
        stack: scanner:2.0
        compute: runnable-default
        stackSpec:
          type: data-product
          sourceConfig:
            config:
              type: DataProductMetadata
              markDeletedDataProducts: true
              dataProductFilterPattern:
                includes:
                  - device-360-agenticai-cadp
