version: v1
name: wf-device-intelligence-360-v1-cadp-sc
type: workflow
description: |
  Scanner workflow for consumer-aligned data product device-intelligence-360-v1-cadp (metadata registration in DataOS).
tags:
  - Tier.Gold
  - SemanticModelAgent
workspace: public
workflow:
  dag:
    - name: device-intelligence-360-v1-cadp-scan
      description: Scanner for device-intelligence-360-v1-cadp (data product metadata registration).
      title: Device Intelligence 360 V1 Cadp CADP scanner
      spec:
        stack: scanner:2.0
        compute: runnable-default
        stackSpec:
          type: data-product
          sourceConfig:
            config:
              type: DataProductMetadata
              markDeletedDataProducts: true
              dataProductFilterPattern:
                includes:
                  - device-intelligence-360-v1-cadp
