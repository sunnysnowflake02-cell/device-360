tables:
  - name: storage_event_data
    title: Storage Event Data
    sql: {{ load_sql('storage_event_data') }}
    description: Storage usage events for devices.
    public: true
    dimensions:
      - name: dataset_context_id
        description: Context identifier for the dataset.
        type: string
        column: dataset_context_id
        primary_key: true
        public: true
      - name: dataset_id
        description: Identifier for the dataset.
        type: string
        column: dataset_id
        public: true
      - name: device_context_id
        description: Context identifier for the device.
        type: string
        column: device_context_id
        public: true
      - name: device_id
        description: Unique identifier for the device.
        type: string
        column: device_id
        public: true
      - name: item_context_id
        description: Context identifier for the item.
        type: string
        column: item_context_id
        public: true
      - name: diskfreepercentage
        description: Percentage of disk space that is free.
        type: number
        column: diskfreepercentage
        public: true
      - name: diskstatus
        description: Current status of the disk.
        type: string
        column: diskstatus
        public: true
      - name: disksize
        description: Total size of the disk.
        type: number
        column: disksize
        public: true
      - name: item_name
        description: Name of the item.
        type: string
        column: item_name
        public: true
      - name: item_time
        description: Timestamp for the item event.
        type: time
        column: item_time
        public: true
      - name: report_time
        description: Timestamp of the report.
        type: time
        column: report_time
        public: true
      - name: schema_ver
        description: Column schema_ver from the source table.
        type: number
        column: schema_ver
        public: true
      - name: subscription_id
        description: Column subscription_id from the source table.
        type: string
        column: subscription_id
        public: true
      - name: subscription_ids
        description: Column subscription_ids from the source table.
        type: string
        column: subscription_ids
        public: true
    measures:
      - name: row_count
        description: Distinct rows at natural grain (count distinct on primary key column).
        type: count
        sql: "{TABLE.dataset_context_id}"
      - name: avg_disk_free_percentage
        description: Average percentage of free disk space across devices.
        type: avg
        sql: "{TABLE.diskfreepercentage}"
      - name: total_disk_size
        description: Total size of disks across devices.
        type: sum
        sql: "{TABLE.disksize}"
