tables:
  - name: device_data
    title: Device Data
    sql: {{ load_sql('device_data') }}
    description: Information about devices in the fleet including identifiers, context, and specifications.
    public: true
    joins:
      - name: device_issue_data
        relationship: one_to_many
        sql: "{TABLE}.device_id = {device_issue_data.device_id}"
      - name: employee_data
        relationship: one_to_many
        sql: "{TABLE}.customer_id = {employee_data.customer_id}"
      - name: laptop_battery_ml_predictions
        relationship: one_to_many
        sql: "{TABLE}.device_id = {laptop_battery_ml_predictions.device_id}"
      - name: memory_event_data
        relationship: one_to_many
        sql: "{TABLE}.device_id = {memory_event_data.device_id}"
      - name: network_event_data
        relationship: one_to_many
        sql: "{TABLE}.device_id = {network_event_data.device_id}"
      - name: process_event_data
        relationship: one_to_many
        sql: "{TABLE}.device_id = {process_event_data.device_id}"
      - name: storage_event_data
        relationship: one_to_many
        sql: "{TABLE}.device_id = {storage_event_data.device_id}"
      - name: warranty_instance_data
        relationship: one_to_many
        sql: "{TABLE}.device_id = {warranty_instance_data.device_id}"
    dimensions:
      - name: device_id
        description: Unique identifier for the device.
        type: string
        column: device_id
        primary_key: true
        public: true
      - name: customer_id
        description: Identifier for the customer associated with the device.
        type: string
        column: customer_id
        public: true
      - name: context_id
        description: Context identifier for the device.
        type: string
        column: context_id
        public: true
      - name: dataset_id
        description: Identifier for the dataset.
        type: string
        column: dataset_id
        public: true
      - name: device_context_datetime
        description: Timestamp of the device context.
        type: time
        column: device_context_datetime
        public: true
      - name: device_context_id
        description: Context ID for the device.
        type: string
        column: device_context_id
        public: true
      - name: device_bios_version
        description: BIOS version of the device.
        type: string
        column: device_bios_version
        public: true
      - name: device_brand
        description: Brand of the device.
        type: string
        column: device_brand
        public: true
      - name: device_ec_version
        description: Embedded controller version of the device.
        type: string
        column: device_ec_version
        public: true
      - name: device_enclosuretype
        description: Type of enclosure for the device.
        type: string
        column: device_enclosuretype
        public: true
      - name: device_family
        description: Family of the device.
        type: string
        column: device_family
        public: true
      - name: device_id2
        description: Secondary identifier for the device.
        type: string
        column: device_id2
        public: true
      - name: device_info_datetime
        description: Timestamp of the device information.
        type: time
        column: device_info_datetime
        public: true
      - name: device_manufacturer
        description: Manufacturer of the device.
        type: string
        column: device_manufacturer
        public: true
      - name: device_modeltype
        description: Model type of the device.
        type: string
        column: device_modeltype
        public: true
      - name: device_name
        description: Name of the device.
        type: string
        column: device_name
        public: true
      - name: device_purchase_date
        description: Purchase date of the device.
        type: time
        column: device_purchase_date
        public: true
      - name: device_smbios_version
        description: SMBIOS version of the device.
        type: string
        column: device_smbios_version
        public: true
      - name: device_subbrand
        description: Sub-brand of the device.
        type: string
        column: device_subbrand
        public: true
      - name: os_country
        description: Country of the operating system.
        type: string
        column: os_country
        public: true
      - name: os_language
        description: Language of the operating system.
        type: string
        column: os_language
        public: true
      - name: os_name
        description: Name of the operating system.
        type: string
        column: os_name
        public: true
      - name: os_update_description
        description: Description of the operating system update.
        type: string
        column: os_update_description
        public: true
      - name: os_update_title
        description: Title of the operating system update.
        type: string
        column: os_update_title
        public: true
      - name: os_version
        description: Version of the operating system.
        type: string
        column: os_version
        public: true
      - name: country_code
        description: Country code of the device.
        type: string
        column: country_code
        public: true
      - name: country_name
        description: Country name of the device.
        type: string
        column: country_name
        public: true
      - name: language_code
        description: Language code of the device.
        type: string
        column: language_code
        public: true
      - name: language_name
        description: Language name of the device.
        type: string
        column: language_name
        public: true
      - name: region_info_datetime
        description: Timestamp of the region information.
        type: time
        column: region_info_datetime
        public: true
      - name: region_name
        description: Name of the region.
        type: string
        column: region_name
        public: true
      - name: report_time
        description: Timestamp of the report.
        type: time
        column: report_time
        public: true
      - name: subscription_id
        description: Subscription identifier associated with the device.
        type: string
        column: subscription_id
        public: true
      - name: subscription_ids
        description: List of subscription identifiers associated with the device.
        type: string
        column: subscription_ids
        public: true
      - name: udc_channel
        description: Channel of the UDC.
        type: string
        column: udc_channel
        public: true
      - name: udc_id
        description: Identifier for the UDC.
        type: string
        column: udc_id
        public: true
      - name: udc_info_datetime
        description: Timestamp of the UDC information.
        type: time
        column: udc_info_datetime
        public: true
      - name: udc_key
        description: Key for the UDC.
        type: string
        column: udc_key
        public: true
      - name: udc_name
        description: Name of the UDC.
        type: string
        column: udc_name
        public: true
      - name: udc_version
        description: Version of the UDC.
        type: number
        column: udc_version
        public: true
      - name: device_inventory_location
        description: Location of the device in inventory.
        type: string
        column: device_inventory_location
        public: true
      - name: schema_ver
        description: Column schema_ver from the source table.
        type: number
        column: schema_ver
        public: true
    measures:
      - name: row_count
        description: Distinct rows at natural grain (count distinct on primary key column).
        type: count
        sql: "{TABLE.device_id}"
    segments:
      - name: north_american_devices
        sql: "{TABLE}.region_name = 'North America'"
        meta:
          secure:
            user_groups:
              includes:
                - device_fleet_admins
